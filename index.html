<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Actor Explorer</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #f8fafc;
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 28px;
    }

    header h1 {
      font-size: 2.4rem;
      margin-bottom: 10px;
      color: #facc15;
    }

    header p {
      color: #cbd5e1;
      font-size: 1rem;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 28px;
    }

    .controls input,
    .controls select {
      padding: 12px 14px;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
      outline: none;
      min-width: 220px;
    }

    .controls input {
      flex: 1;
      max-width: 380px;
    }

    .stats {
      text-align: center;
      margin-bottom: 22px;
      color: #cbd5e1;
      font-size: 0.95rem;
    }

    .actor-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      backdrop-filter: blur(8px);
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 14px 28px rgba(0,0,0,0.35);
    }

    .card img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      display: block;
    }

    .card-content {
      padding: 18px;
    }

    .card h2 {
      font-size: 1.25rem;
      margin-bottom: 8px;
      color: #f8fafc;
    }

    .meta {
      font-size: 0.92rem;
      color: #cbd5e1;
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .movies {
      margin-top: 10px;
    }

    .movies h3 {
      font-size: 0.98rem;
      margin-bottom: 8px;
      color: #facc15;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      background: #334155;
      color: #e2e8f0;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.82rem;
    }

    .empty {
      text-align: center;
      padding: 50px 20px;
      color: #cbd5e1;
      font-size: 1.1rem;
    }

    footer {
      text-align: center;
      margin-top: 30px;
      color: #94a3b8;
      font-size: 0.9rem;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 1.9rem;
      }

      .card img {
        height: 280px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🎬 Movie Actor Explorer</h1>
      <p>배우 이름, 국적, 장르로 검색하고 대표작을 확인해 보세요.</p>
    </header>

    <section class="controls">
      <input type="text" id="searchInput" placeholder="배우 이름 또는 영화 제목 검색..." />
      <select id="genreFilter">
        <option value="all">모든 장르</option>
        <option value="Action">Action</option>
        <option value="Drama">Drama</option>
        <option value="Sci-Fi">Sci-Fi</option>
        <option value="Comedy">Comedy</option>
        <option value="Thriller">Thriller</option>
        <option value="Fantasy">Fantasy</option>
      </select>
      <select id="nationalityFilter">
        <option value="all">모든 국적</option>
        <option value="USA">USA</option>
        <option value="UK">UK</option>
        <option value="Korea">Korea</option>
        <option value="Canada">Canada</option>
        <option value="Australia">Australia</option>
      </select>
    </section>

    <div class="stats" id="statsText">총 0명의 배우</div>

    <section class="actor-grid" id="actorGrid"></section>

    <footer>
      Movie Actor Explorer Demo Page
    </footer>
  </div>

  <script>
    const actors = [
      {
        name: "Leonardo DiCaprio",
        nationality: "USA",
        genre: "Drama",
        age: 49,
        image: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=800&q=80",
        movies: ["Inception", "Titanic", "The Revenant"]
      },
      {
        name: "Scarlett Johansson",
        nationality: "USA",
        genre: "Action",
        age: 40,
        image: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=800&q=80",
        movies: ["Black Widow", "Lucy", "Marriage Story"]
      },
      {
        name: "Benedict Cumberbatch",
        nationality: "UK",
        genre: "Sci-Fi",
        age: 49,
        image: "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?auto=format&fit=crop&w=800&q=80",
        movies: ["Doctor Strange", "Sherlock", "The Imitation Game"]
      },
      {
        name: "Song Kang-ho",
        nationality: "Korea",
        genre: "Thriller",
        age: 59,
        image: "https://images.unsplash.com/photo-1504593811423-6dd665756598?auto=format&fit=crop&w=800&q=80",
        movies: ["Parasite", "Memories of Murder", "Broker"]
      },
      {
        name: "Emma Watson",
        nationality: "UK",
        genre: "Fantasy",
        age: 35,
        image: "https://images.unsplash.com/photo-1488426862026-3ee34a7d66df?auto=format&fit=crop&w=800&q=80",
        movies: ["Harry Potter", "Beauty and the Beast", "Little Women"]
      },
      {
        name: "Ryan Reynolds",
        nationality: "Canada",
        genre: "Comedy",
        age: 49,
        image: "https://images.unsplash.com/photo-1502767089025-6572583495b4?auto=format&fit=crop&w=800&q=80",
        movies: ["Deadpool", "Free Guy", "The Proposal"]
      },
      {
        name: "Chris Hemsworth",
        nationality: "Australia",
        genre: "Action",
        age: 42,
        image: "https://images.unsplash.com/photo-1504257432389-52343af06ae3?auto=format&fit=crop&w=800&q=80",
        movies: ["Thor", "Extraction", "Rush"]
      },
      {
        name: "Meryl Streep",
        nationality: "USA",
        genre: "Drama",
        age: 76,
        image: "https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&w=800&q=80",
        movies: ["The Devil Wears Prada", "Mamma Mia!", "Sophie's Choice"]
      }
    ];

    const actorGrid = document.getElementById("actorGrid");
    const searchInput = document.getElementById("searchInput");
    const genreFilter = document.getElementById("genreFilter");
    const nationalityFilter = document.getElementById("nationalityFilter");
    const statsText = document.getElementById("statsText");

    function renderActors(actorList) {
      actorGrid.innerHTML = "";

      if (actorList.length === 0) {
        actorGrid.innerHTML = `<div class="empty">검색 결과가 없습니다.</div>`;
        statsText.textContent = "총 0명의 배우";
        return;
      }

      actorList.forEach(actor => {
        const movieTags = actor.movies.map(movie => `<span class="tag">${movie}</span>`).join("");

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <img src="${actor.image}" alt="${actor.name}">
          <div class="card-content">
            <h2>${actor.name}</h2>
            <div class="meta">
              <div><strong>국적:</strong> ${actor.nationality}</div>
              <div><strong>주요 장르:</strong> ${actor.genre}</div>
              <div><strong>나이:</strong> ${actor.age}</div>
            </div>
            <div class="movies">
              <h3>대표작</h3>
              <div class="tag-list">${movieTags}</div>
            </div>
          </div>
        `;
        actorGrid.appendChild(card);
      });

      statsText.textContent = `총 ${actorList.length}명의 배우`;
    }

    function filterActors() {
      const keyword = searchInput.value.toLowerCase().trim();
      const selectedGenre = genreFilter.value;
      const selectedNationality = nationalityFilter.value;

      const filtered = actors.filter(actor => {
        const matchesKeyword =
          actor.name.toLowerCase().includes(keyword) ||
          actor.movies.some(movie => movie.toLowerCase().includes(keyword));

        const matchesGenre =
          selectedGenre === "all" || actor.genre === selectedGenre;

        const matchesNationality =
          selectedNationality === "all" || actor.nationality === selectedNationality;

        return matchesKeyword && matchesGenre && matchesNationality;
      });

      renderActors(filtered);
    }

    searchInput.addEventListener("input", filterActors);
    genreFilter.addEventListener("change", filterActors);
    nationalityFilter.addEventListener("change", filterActors);

    renderActors(actors);
  </script>
</body>
</html>
